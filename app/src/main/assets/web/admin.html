<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — ServerPages</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .admin-bar {
      background: #1b3d1b;
      border-bottom: 1px solid #2d5a2d;
      padding: 6px 24px;
      font-size: 12px;
      color: #66bb6a;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .live-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }
    .live-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .live-header h2 { font-size: 20px; }
    .player-wrapper {
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .stream-info {
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 24px;
      font-size: 13px;
      color: var(--text-muted);
      flex-wrap: wrap;
    }
    .viewer-count {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 12px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="admin-bar">ADMIN — No authentication required</div>
  <div class="header">
    <h1>ServerPages</h1>
    <span class="status-dot" id="statusDot"></span>
    <nav>
      <a href="/admin" class="active">Monitor</a>
      <a href="/admin/media.html">Media</a>
    </nav>
  </div>

  <div class="live-container">
    <div class="live-header">
      <span class="live-badge" id="liveBadge" style="display:none">LIVE</span>
      <h2>Admin Monitor</h2>
    </div>

    <div class="player-wrapper">
      <video id="player" autoplay playsinline controls muted></video>
      <div class="player-overlay" id="overlay">
        Waiting for stream...
      </div>
    </div>

    <div class="stream-info">
      <span id="resolution">—</span>
      <span id="uptime">—</span>
      <span id="status">Connecting...</span>
      <span class="viewer-count" id="viewers">0 viewers</span>
      <span id="tailscaleInfo" style="display:none; color: #66bb6a; font-weight: 600;"></span>
      <button id="cameraBtn" onclick="switchCamera()" style="margin-left:auto; padding:4px 14px; border:1px solid var(--border); border-radius:6px; background:var(--surface); color:var(--text); font-size:13px; font-weight:600; cursor:pointer;">&#128247; Back</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
  <script>
    const video = document.getElementById('player');
    const overlay = document.getElementById('overlay');
    const statusDot = document.getElementById('statusDot');
    const liveBadge = document.getElementById('liveBadge');
    const statusText = document.getElementById('status');
    const resText = document.getElementById('resolution');
    const viewersEl = document.getElementById('viewers');
    let hls = null;
    let retryTimeout = null;
    let startTimeout = null;

    function startStream() {
      if (hls) { hls.destroy(); hls = null; }
      clearTimeout(startTimeout);

      if (Hls.isSupported()) {
        hls = new Hls({
          liveDurationInfinity: true,
          enableWorker: true,
          lowLatencyMode: false,
          backBufferLength: 0,
          manifestLoadingTimeOut: 10000,
          manifestLoadingMaxRetry: 3,
          levelLoadingTimeOut: 10000,
          fragLoadingTimeOut: 10000
        });

        // Admin uses /admin/hls/ path — not counted as a viewer
        hls.loadSource('/admin/hls/screen.m3u8');
        hls.attachMedia(video);

        // Timeout: if no playback within 15s, retry
        startTimeout = setTimeout(() => {
          if (video.paused || video.readyState < 2) {
            if (hls) { hls.destroy(); hls = null; }
            streamOffline();
          }
        }, 15000);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          clearTimeout(startTimeout);
          overlay.classList.add('hidden');
          statusDot.classList.add('live');
          liveBadge.style.display = '';
          statusText.textContent = 'Streaming';
          video.play().catch(() => {});
        });

        hls.on(Hls.Events.ERROR, (e, data) => {
          if (data.fatal) {
            clearTimeout(startTimeout);
            hls.destroy();
            hls = null;
            streamOffline();
          }
        });

        hls.on(Hls.Events.LEVEL_LOADED, () => {
          if (video.videoWidth) {
            resText.textContent = `${video.videoWidth}x${video.videoHeight}`;
          }
        });

      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = '/admin/hls/screen.m3u8';
        video.addEventListener('loadedmetadata', () => {
          overlay.classList.add('hidden');
          statusDot.classList.add('live');
          liveBadge.style.display = '';
          statusText.textContent = 'Streaming';
          video.play().catch(() => {});
        });
        video.addEventListener('error', streamOffline);
      }
    }

    function streamOffline() {
      overlay.classList.remove('hidden');
      overlay.textContent = 'Stream offline — retrying in 5s...';
      statusDot.classList.remove('live');
      liveBadge.style.display = 'none';
      statusText.textContent = 'Reconnecting...';
      clearTimeout(retryTimeout);
      retryTimeout = setTimeout(startStream, 5000);
    }

    async function updateStatus() {
      try {
        const res = await fetch('/admin/api/status');
        const data = await res.json();
        if (data.uptime) {
          const mins = Math.floor(data.uptime / 60);
          const hrs = Math.floor(mins / 60);
          document.getElementById('uptime').textContent =
            hrs > 0 ? `Uptime: ${hrs}h ${mins % 60}m` : `Uptime: ${mins}m`;
        }
        if (typeof data.viewers === 'number') {
          viewersEl.textContent = data.viewers === 1 ? '1 viewer' : `${data.viewers} viewers`;
          viewersEl.style.color = data.viewers > 0 ? '#66bb6a' : '';
        }
        const tsEl = document.getElementById('tailscaleInfo');
        if (data.tailscaleUrl) {
          tsEl.textContent = 'Tailscale: ' + data.tailscaleUrl;
          tsEl.style.display = '';
        }
        if (data.camera) {
          document.getElementById('cameraBtn').textContent = '\u{1F4F7} ' + (data.camera === 'front' ? 'Front' : 'Back');
        }
        if (data.streamReady && !hls && !video.src) {
          startStream();
        }
      } catch (e) {}
    }

    async function switchCamera() {
      const btn = document.getElementById('cameraBtn');
      btn.disabled = true;
      try {
        const res = await fetch('/admin/api/camera', { method: 'POST' });
        const data = await res.json();
        btn.textContent = '\u{1F4F7} ' + (data.camera === 'front' ? 'Front' : 'Back');
      } catch (e) {}
      btn.disabled = false;
    }

    startStream();
    updateStatus();
    setInterval(updateStatus, 5000);
  </script>
</body>
</html>
