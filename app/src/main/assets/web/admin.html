<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — AirDeck</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .admin-bar {
      background: #1b3d1b;
      border-bottom: 1px solid #2d5a2d;
      padding: 6px 24px;
      font-size: 12px;
      color: #66bb6a;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .live-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }
    .live-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .live-header h2 { font-size: 20px; }
    .player-wrapper {
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .stream-info {
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 24px;
      font-size: 13px;
      color: var(--text-muted);
      flex-wrap: wrap;
    }
    .viewer-count {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 12px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="admin-bar">ADMIN — No authentication required</div>
  <div class="header">
    <h1>AirDeck</h1>
    <span class="status-dot" id="statusDot"></span>
    <nav>
      <a href="/admin" class="active">Monitor</a>
      <a href="/admin/media.html">Media</a>
    </nav>
  </div>

  <div class="live-container">
    <div class="live-header">
      <span class="live-badge" id="liveBadge" style="display:none">LIVE</span>
      <h2>Admin Monitor</h2>
    </div>

    <div class="player-wrapper">
      <video id="player" autoplay playsinline muted style="position:absolute;width:1px;height:1px;opacity:0;"></video>
      <canvas id="videoCanvas" style="max-width:100%;max-height:70vh;display:block;background:#000;border-radius:8px;margin:0 auto;"></canvas>
      <div class="player-overlay" id="overlay">
        Waiting for stream...
      </div>
    </div>

    <div class="stream-info">
      <span id="resolution">—</span>
      <span id="uptime">—</span>
      <span id="status">Connecting...</span>
      <span class="viewer-count" id="viewers">0 viewers</span>
      <span class="viewer-count" id="webrtcPeers" style="display:none; color:#66bb6a;">0 P2P</span>
      <span id="publicUrlInfo" style="display:none; color: #42a5f5; font-weight: 600;"></span>
      <span id="tailscaleInfo" style="display:none; color: #66bb6a; font-weight: 600;"></span>
      <button id="audioBtn" onclick="toggleAudio()" style="padding:4px 14px; border:1px solid var(--border); border-radius:6px; background:var(--surface); color:var(--text); font-size:16px; cursor:pointer;" title="Unmute audio">&#128263;</button>
      <button id="sourceBtn" onclick="switchSource()" style="display:none; margin-left:auto; padding:4px 14px; border:1px solid var(--border); border-radius:6px; background:var(--surface); color:var(--text); font-size:13px; font-weight:600; cursor:pointer;">&#128247; Camera</button>
      <button id="cameraBtn" onclick="switchCamera()" style="padding:4px 14px; border:1px solid var(--border); border-radius:6px; background:var(--surface); color:var(--text); font-size:13px; font-weight:600; cursor:pointer;">&#128247; Back</button>
    </div>
  </div>

  <script src="/admin/webrtc.js"></script>
  <script>
    const video = document.getElementById('player');
    const videoCanvas = document.getElementById('videoCanvas');
    const canvasCtx = videoCanvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const statusDot = document.getElementById('statusDot');
    const liveBadge = document.getElementById('liveBadge');
    const statusText = document.getElementById('status');
    const resText = document.getElementById('resolution');
    const viewersEl = document.getElementById('viewers');
    let retryTimeout = null;
    let canvasRunning = false;
    let streamerStopped = false;
    let streaming = false;

    // ─── Canvas renderer ─────────────────────────
    function drawVideoFrame() {
      if (!canvasRunning) return;
      if (video.readyState >= 2 && video.videoWidth > 0) {
        if (videoCanvas.width !== video.videoWidth || videoCanvas.height !== video.videoHeight) {
          videoCanvas.width = video.videoWidth;
          videoCanvas.height = video.videoHeight;
        }
        canvasCtx.drawImage(video, 0, 0);
      }
      requestAnimationFrame(drawVideoFrame);
    }
    function startCanvasRenderer() {
      if (!canvasRunning) { canvasRunning = true; drawVideoFrame(); }
    }
    function stopCanvasRenderer() { canvasRunning = false; }

    // ─── WebRTC streaming ────────────────────────
    function cleanup() {
      stopCanvasRenderer();
      streaming = false;
      if (window._airdeckWebRTC) {
        window._airdeckWebRTC.stop();
        window._airdeckWebRTC = null;
      }
      video.srcObject = null;
    }

    async function startStream() {
      cleanup();
      clearTimeout(retryTimeout);
      overlay.classList.remove('hidden');
      overlay.textContent = 'Connecting (P2P)...';
      statusText.textContent = 'Connecting...';

      try {
        await new Promise((resolve, reject) => {
          let settled = false;
          const settle = (fn) => { if (!settled) { settled = true; fn(); } };

          const rtc = new AirDeckWebRTC(video, {
            basePath: '/admin',
            onConnected: () => {
              overlay.classList.add('hidden');
              statusDot.classList.add('live');
              liveBadge.style.display = '';
              statusText.textContent = 'Streaming (P2P)';
              streaming = true;
              startCanvasRenderer();
              video.onloadedmetadata = () => {
                if (video.videoWidth) resText.textContent = video.videoWidth + 'x' + video.videoHeight;
              };
              settle(() => resolve());
            },
            onDisconnected: () => {
              settle(() => reject(new Error('disconnected')));
              if (!streamerStopped) {
                statusText.textContent = 'Reconnecting...';
                overlay.textContent = 'Reconnecting...';
                overlay.classList.remove('hidden');
                cleanup();
                clearTimeout(retryTimeout);
                retryTimeout = setTimeout(startStream, 2000);
              }
            },
            onError: (msg) => settle(() => reject(new Error(msg)))
          });

          window._airdeckWebRTC = rtc;
          rtc.start().then(() => {
            setTimeout(() => settle(() => reject(new Error('timeout'))), 10000);
          }).catch(err => settle(() => reject(err)));
        });
      } catch (e) {
        streamOffline();
      }
    }

    function streamOffline() {
      overlay.classList.remove('hidden');
      statusDot.classList.remove('live');
      liveBadge.style.display = 'none';
      if (streamerStopped) {
        overlay.textContent = 'Stream stopped by streamer';
        statusText.textContent = 'Stopped';
        clearTimeout(retryTimeout);
      } else {
        overlay.textContent = 'Stream offline — retrying in 5s...';
        statusText.textContent = 'Reconnecting...';
        clearTimeout(retryTimeout);
        retryTimeout = setTimeout(startStream, 5000);
      }
    }

    // ─── Status polling ──────────────────────────
    async function updateStatus() {
      try {
        const res = await fetch('/admin/api/status');
        const data = await res.json();
        if (data.uptime) {
          const mins = Math.floor(data.uptime / 60);
          const hrs = Math.floor(mins / 60);
          document.getElementById('uptime').textContent =
            hrs > 0 ? `Uptime: ${hrs}h ${mins % 60}m` : `Uptime: ${mins}m`;
        }
        if (typeof data.viewers === 'number') {
          viewersEl.textContent = data.viewers === 1 ? '1 viewer' : `${data.viewers} viewers`;
          viewersEl.style.color = data.viewers > 0 ? '#66bb6a' : '';
        }
        const webrtcEl = document.getElementById('webrtcPeers');
        if (typeof data.webrtcPeers === 'number' && data.webrtc) {
          webrtcEl.textContent = data.webrtcPeers + ' P2P';
          webrtcEl.style.display = '';
          webrtcEl.style.color = data.webrtcPeers > 0 ? '#66bb6a' : '#888';
        } else {
          webrtcEl.style.display = 'none';
        }
        const pubEl = document.getElementById('publicUrlInfo');
        if (data.publicUrl) {
          pubEl.innerHTML = 'Public: <a href="' + data.publicUrl + '" target="_blank" style="color:#42a5f5">' + data.publicUrl + '</a>'
            + ' <button id="copyBtn" onclick="copyUrl(\'' + data.publicUrl.replace(/'/g, "\\'") + '\')" style="background:#e040fb;border:none;border-radius:6px;color:#fff;cursor:pointer;padding:4px 12px;font-size:12px;font-weight:700;vertical-align:middle;margin-left:4px;">Copy</button>';
          pubEl.style.display = '';
        } else {
          pubEl.style.display = 'none';
        }
        if (data.camera) {
          document.getElementById('cameraBtn').textContent = '\u{1F4F7} ' + (data.camera === 'front' ? 'Front' : 'Back');
        }
        // Source toggle
        const sourceBtn = document.getElementById('sourceBtn');
        if (data.screenAvailable) {
          sourceBtn.style.display = '';
          sourceBtn.dataset.source = data.source;
          sourceBtn.textContent = data.source === 'screen' ? '\u{1F5A5} Screen' : '\u{1F4F7} Camera';
          document.getElementById('cameraBtn').style.display = data.source === 'screen' ? 'none' : '';
        } else {
          sourceBtn.style.display = 'none';
        }
        if (data.cameraPaused) {
          overlay.textContent = 'Camera in use by another app...';
          overlay.classList.remove('hidden');
        } else if (data.capturing && streaming) {
          overlay.classList.add('hidden');
        }
        if (data.capturing === false) {
          streamerStopped = true;
          cleanup();
          streamOffline();
        } else if (data.capturing === true && streamerStopped) {
          streamerStopped = false;
        }
        if (data.capturing && !streaming && !window._airdeckWebRTC) {
          startStream();
        }
      } catch (e) {}
    }

    async function switchCamera() {
      const btn = document.getElementById('cameraBtn');
      btn.disabled = true;
      try {
        const res = await fetch('/admin/api/camera', { method: 'POST' });
        const data = await res.json();
        btn.textContent = '\u{1F4F7} ' + (data.camera === 'front' ? 'Front' : 'Back');
      } catch (e) {}
      btn.disabled = false;
    }

    async function switchSource() {
      const btn = document.getElementById('sourceBtn');
      btn.disabled = true;
      const currentMode = btn.dataset.source || 'camera';
      const newMode = currentMode === 'camera' ? 'screen' : 'camera';
      try {
        const res = await fetch('/admin/api/source', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mode: newMode })
        });
        const data = await res.json();
        btn.dataset.source = data.source;
        btn.textContent = data.source === 'screen' ? '\u{1F5A5} Screen' : '\u{1F4F7} Camera';
        // Hide/show camera switch based on source
        document.getElementById('cameraBtn').style.display = data.source === 'screen' ? 'none' : '';
      } catch (e) {}
      btn.disabled = false;
    }

    function copyUrl(url) {
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById('copyBtn');
        if (btn) { btn.textContent = 'Copied!'; btn.style.background = '#66bb6a'; setTimeout(() => { btn.textContent = 'Copy'; btn.style.background = '#e040fb'; }, 1500); }
      }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = url; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
        const btn = document.getElementById('copyBtn');
        if (btn) { btn.textContent = 'Copied!'; btn.style.background = '#66bb6a'; setTimeout(() => { btn.textContent = 'Copy'; btn.style.background = '#e040fb'; }, 1500); }
      });
    }

    // ─── Audio toggle ───────────────────────────
    function toggleAudio() {
      video.muted = !video.muted;
      document.getElementById('audioBtn').innerHTML = video.muted ? '&#128263;' : '&#128266;';
      document.getElementById('audioBtn').title = video.muted ? 'Unmute audio' : 'Mute audio';
    }

    startStream();
    updateStatus();
    setInterval(updateStatus, 5000);
  </script>
</body>
</html>
