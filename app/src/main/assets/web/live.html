<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Stream — AirDeck</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .live-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }
    .live-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .live-header h2 { font-size: 20px; }
    .player-wrapper {
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .stream-info {
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 24px;
      font-size: 13px;
      color: var(--text-muted);
      flex-wrap: wrap;
    }
    .conn-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      background: #1b5e20;
      color: #66bb6a;
    }

    /* ─── Chat ───────────────────────────────── */
    .chat-toggle-btn {
      margin-top: 16px;
      padding: 8px 20px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .chat-toggle-btn:hover { background: #222; }
    .chat-panel {
      display: none;
      margin-top: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #111;
      overflow: hidden;
    }
    .chat-panel.open { display: block; }
    .chat-messages {
      height: 300px;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .chat-empty {
      color: #555;
      text-align: center;
      padding: 48px 0;
      font-size: 14px;
    }
    .chat-bubble {
      max-width: 70%;
      padding: 8px 12px;
      border-radius: 16px;
      font-size: 14px;
      color: #fff;
      word-break: break-word;
    }
    .chat-bubble.viewer {
      background: #1565C0;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .chat-bubble.streamer {
      background: #2E2E2E;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .chat-bubble .time {
      font-size: 10px;
      color: #999;
      text-align: right;
      margin-top: 2px;
    }
    .chat-input-bar {
      display: flex;
      padding: 8px;
      gap: 8px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .chat-input-bar input {
      flex: 1;
      padding: 8px 14px;
      border: 1px solid #333;
      border-radius: 20px;
      background: #0d0d0d;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    .chat-input-bar input:focus { border-color: var(--accent); }
    .chat-input-bar button {
      padding: 8px 16px;
      border: none;
      border-radius: 20px;
      background: var(--accent);
      color: #000;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .chat-input-bar button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="header">
    <h1>AirDeck</h1>
    <span class="status-dot" id="statusDot"></span>
    <nav>
      <a href="/">Dashboard</a>
      <a href="/live.html" class="active">Live</a>
      <a href="/media.html">Media</a>
    </nav>
  </div>

  <div class="live-container">
    <div class="live-header">
      <span class="live-badge" id="liveBadge" style="display:none">LIVE</span>
      <h2>Screen Stream</h2>
      <span class="conn-badge" id="connBadge" style="display:none">P2P</span>
    </div>

    <div class="player-wrapper">
      <video id="player" autoplay playsinline muted style="position:absolute;width:1px;height:1px;opacity:0;"></video>
      <canvas id="videoCanvas" style="max-width:100%;max-height:70vh;display:block;background:#000;border-radius:8px;margin:0 auto;"></canvas>
      <div class="player-overlay" id="overlay">
        Waiting for stream...
      </div>
    </div>

    <div class="stream-info">
      <span id="resolution">—</span>
      <span id="uptime">—</span>
      <span id="status">Connecting...</span>
      <span id="publicUrlInfo" style="display:none; color: #42a5f5; font-weight: 600; font-size: 12px;"></span>
      <button id="audioBtn" onclick="toggleAudio()" style="padding:4px 14px; border:1px solid var(--border); border-radius:6px; background:var(--surface); color:var(--text); font-size:16px; cursor:pointer;" title="Unmute audio">&#128263;</button>
      <button id="cameraBtn" onclick="switchCamera()" style="padding:4px 14px; border:1px solid var(--border); border-radius:6px; background:var(--surface); color:var(--text); font-size:13px; font-weight:600; cursor:pointer;">&#128247; Back</button>
    </div>

    <!-- Chat Section -->
    <button class="chat-toggle-btn" id="chatToggle" onclick="toggleChat()">Chat</button>

    <div class="chat-panel" id="chatPanel">
      <div class="chat-messages" id="chatMessages">
        <div class="chat-empty">No messages yet — say hi!</div>
      </div>
      <div class="chat-input-bar">
        <input type="text" id="chatInput" placeholder="Type a message..." maxlength="1000"
               onkeydown="if(event.key==='Enter')sendChat()">
        <button onclick="sendChat()">Send</button>
      </div>
    </div>
  </div>

  <script src="/webrtc.js"></script>

  <script>
    const video = document.getElementById('player');
    const overlay = document.getElementById('overlay');
    const statusDot = document.getElementById('statusDot');
    const liveBadge = document.getElementById('liveBadge');
    const connBadge = document.getElementById('connBadge');
    const statusText = document.getElementById('status');
    const resText = document.getElementById('resolution');
    let retryTimeout = null;
    let streaming = false;

    // ─── Canvas renderer ─────────────────────────
    const videoCanvas = document.getElementById('videoCanvas');
    const canvasCtx = videoCanvas.getContext('2d');
    let canvasRunning = false;

    function drawVideoFrame() {
      if (!canvasRunning) return;
      if (video.readyState >= 2 && video.videoWidth > 0) {
        if (videoCanvas.width !== video.videoWidth || videoCanvas.height !== video.videoHeight) {
          videoCanvas.width = video.videoWidth;
          videoCanvas.height = video.videoHeight;
        }
        canvasCtx.drawImage(video, 0, 0);
      }
      requestAnimationFrame(drawVideoFrame);
    }

    function startCanvasRenderer() {
      if (!canvasRunning) { canvasRunning = true; drawVideoFrame(); }
    }
    function stopCanvasRenderer() { canvasRunning = false; }

    // ─── WebRTC streaming ────────────────────────
    function cleanup() {
      stopCanvasRenderer();
      streaming = false;
      if (window._airdeckWebRTC) {
        window._airdeckWebRTC.stop();
        window._airdeckWebRTC = null;
      }
      video.srcObject = null;
    }

    async function startStream() {
      cleanup();
      clearTimeout(retryTimeout);
      overlay.classList.remove('hidden');
      overlay.textContent = 'Connecting (P2P)...';
      statusText.textContent = 'Connecting...';

      try {
        await new Promise((resolve, reject) => {
          let settled = false;
          const settle = (fn) => { if (!settled) { settled = true; fn(); } };

          const rtc = new AirDeckWebRTC(video, {
            onConnected: () => {
              overlay.classList.add('hidden');
              statusDot.classList.add('live');
              liveBadge.style.display = '';
              connBadge.style.display = '';
              statusText.textContent = 'Streaming (P2P)';
              streaming = true;
              startCanvasRenderer();
              video.onloadedmetadata = () => {
                if (video.videoWidth) resText.textContent = video.videoWidth + 'x' + video.videoHeight;
              };
              settle(() => resolve());
            },
            onDisconnected: () => {
              settle(() => reject(new Error('disconnected')));
              if (!streamerStopped) {
                statusText.textContent = 'Reconnecting P2P...';
                overlay.textContent = 'Reconnecting...';
                overlay.classList.remove('hidden');
                cleanup();
                clearTimeout(retryTimeout);
                retryTimeout = setTimeout(startStream, 2000);
              }
            },
            onError: (msg) => {
              settle(() => reject(new Error(msg)));
            }
          });

          window._airdeckWebRTC = rtc;
          rtc.start().then(() => {
            setTimeout(() => settle(() => reject(new Error('timeout'))), 10000);
          }).catch(err => settle(() => reject(err)));
        });
      } catch (e) {
        streamOffline();
      }
    }

    let streamerStopped = false;

    function streamOffline() {
      overlay.classList.remove('hidden');
      statusDot.classList.remove('live');
      liveBadge.style.display = 'none';
      connBadge.style.display = 'none';
      if (streamerStopped) {
        overlay.textContent = 'Stream stopped by streamer';
        statusText.textContent = 'Stopped';
        clearTimeout(retryTimeout);
      } else {
        overlay.textContent = 'Stream offline — retrying in 5s...';
        statusText.textContent = 'Reconnecting...';
        clearTimeout(retryTimeout);
        retryTimeout = setTimeout(startStream, 5000);
      }
    }

    async function updateStatus() {
      try {
        const res = await fetch('/api/status', { credentials: 'include' });
        const data = await res.json();
        if (data.uptime) {
          const mins = Math.floor(data.uptime / 60);
          const hrs = Math.floor(mins / 60);
          document.getElementById('uptime').textContent =
            hrs > 0 ? `Uptime: ${hrs}h ${mins % 60}m` : `Uptime: ${mins}m`;
        }
        if (data.camera) {
          document.getElementById('cameraBtn').textContent = '\u{1F4F7} ' + (data.camera === 'front' ? 'Front' : 'Back');
        }
        const pubEl = document.getElementById('publicUrlInfo');
        if (data.publicUrl) {
          pubEl.innerHTML = 'Share: <a href="' + data.publicUrl + '" target="_blank" style="color:#42a5f5">' + data.publicUrl + '</a>'
            + ' <button id="copyBtn" onclick="copyUrl(\'' + data.publicUrl.replace(/'/g, "\\'") + '\')" style="background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--accent);cursor:pointer;padding:4px 10px;font-size:12px;font-weight:600;vertical-align:middle;">Copy</button>';
          pubEl.style.display = '';
        }
        if (data.cameraPaused) {
          overlay.textContent = 'Camera in use by another app...';
          overlay.classList.remove('hidden');
        } else if (data.capturing && streaming) {
          overlay.classList.add('hidden');
        }
        if (data.capturing === false) {
          streamerStopped = true;
          cleanup();
          streamOffline();
        } else if (data.capturing === true && streamerStopped) {
          streamerStopped = false;
        }
        if (data.capturing && !streaming && !window._airdeckWebRTC) {
          startStream();
        }
      } catch (e) {}
    }

    async function switchCamera() {
      const btn = document.getElementById('cameraBtn');
      btn.disabled = true;
      try {
        const res = await fetch('/api/camera', { method: 'POST', credentials: 'include' });
        const data = await res.json();
        btn.textContent = '\u{1F4F7} ' + (data.camera === 'front' ? 'Front' : 'Back');
      } catch (e) {}
      btn.disabled = false;
    }

    // ─── Chat ─────────────────────────────────────
    let chatOpen = false;
    let chatPollTimer = null;
    let lastChatTime = 0;

    function toggleChat() {
      chatOpen = !chatOpen;
      const panel = document.getElementById('chatPanel');
      const btn = document.getElementById('chatToggle');
      panel.classList.toggle('open', chatOpen);
      btn.textContent = chatOpen ? 'Hide Chat' : 'Chat';

      if (chatOpen) {
        loadChat();
        chatPollTimer = setInterval(loadChat, 3000);
      } else {
        clearInterval(chatPollTimer);
        chatPollTimer = null;
      }
    }

    async function loadChat() {
      try {
        const res = await fetch('/api/chat/messages?since=' + lastChatTime, { credentials: 'include' });
        if (!res.ok) return;
        const data = await res.json();
        const container = document.getElementById('chatMessages');

        if (data.messages && data.messages.length > 0) {
          const empty = container.querySelector('.chat-empty');
          if (empty) empty.remove();

          data.messages.forEach(msg => {
            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble ' + msg.from;
            const t = new Date(msg.time);
            const timeStr = t.getHours().toString().padStart(2,'0') + ':' + t.getMinutes().toString().padStart(2,'0');
            bubble.innerHTML = escapeHtml(msg.text) + '<div class="time">' + timeStr + '</div>';
            container.appendChild(bubble);
            if (msg.time > lastChatTime) lastChatTime = msg.time;
          });

          container.scrollTop = container.scrollHeight;
        }
      } catch (e) {}
    }

    async function sendChat() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';

      try {
        await fetch('/api/chat/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ text })
        });
        await loadChat();
      } catch (e) {}
    }

    function copyUrl(url) {
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById('copyBtn');
        if (btn) {
          btn.textContent = 'Copied!';
          btn.style.color = '#66bb6a';
          setTimeout(() => { btn.textContent = 'Copy'; btn.style.color = ''; }, 1500);
        }
      }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = url;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        const btn = document.getElementById('copyBtn');
        if (btn) {
          btn.textContent = 'Copied!';
          btn.style.color = '#66bb6a';
          setTimeout(() => { btn.textContent = 'Copy'; btn.style.color = ''; }, 1500);
        }
      });
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ─── Audio toggle ───────────────────────────
    function toggleAudio() {
      video.muted = !video.muted;
      document.getElementById('audioBtn').innerHTML = video.muted ? '&#128263;' : '&#128266;';
      document.getElementById('audioBtn').title = video.muted ? 'Unmute audio' : 'Mute audio';
    }

    startStream();
    updateStatus();
    setInterval(updateStatus, 5000);
  </script>
</body>
</html>
