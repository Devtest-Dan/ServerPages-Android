<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AirDeck</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .status-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s;
    }
    .status-card:hover { border-color: var(--accent); }
    .status-icon {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: #222;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .status-icon.live { background: #1b3d1b; }
    .status-label { font-size: 15px; color: var(--text-muted); }
    .status-value { font-size: 20px; font-weight: 700; margin-top: 2px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>AirDeck</h1>
    <span class="status-dot" id="statusDot"></span>
    <nav>
      <a href="/" class="active">Dashboard</a>
      <a href="/live.html">Live</a>
    </nav>
  </div>

  <div class="container">
    <div class="dashboard-grid">
      <a href="/live.html" class="status-card" id="streamCard">
        <div class="status-icon" id="streamIcon">&#128250;</div>
        <div>
          <div class="status-label">Screen Stream</div>
          <div class="status-value" id="streamStatus">Offline</div>
        </div>
        <span class="live-badge" id="liveBadge" style="display:none;margin-left:auto">LIVE</span>
      </a>
    </div>
  </div>

  <script>
    async function checkStatus() {
      try {
        const res = await fetch('/api/status');
        const data = await res.json();
        const dot = document.getElementById('statusDot');
        const badge = document.getElementById('liveBadge');
        const icon = document.getElementById('streamIcon');
        const status = document.getElementById('streamStatus');

        if (data.streamReady) {
          dot.classList.add('live');
          badge.style.display = '';
          icon.classList.add('live');
          const v = data.viewers || 0;
          status.textContent = v === 1 ? '1 viewer' : v + ' viewers';
        } else if (data.capturing) {
          dot.classList.add('live');
          badge.style.display = 'none';
          icon.classList.remove('live');
          status.textContent = 'Starting...';
        } else {
          dot.classList.remove('live');
          badge.style.display = 'none';
          icon.classList.remove('live');
          status.textContent = 'Offline';
        }
      } catch (e) {}
    }

    checkStatus();
    setInterval(checkStatus, 5000);
  </script>
</body>
</html>
